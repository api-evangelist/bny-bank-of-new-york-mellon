naftiko: 1.0.0-alpha2
info:
  label: BNY Asset Servicing API
  description: 'BNY Asset Servicing API. 1 operation. Lead operation: Get Asset Servicing Status. Self-contained Naftiko
    capability covering one BNY business surface.'
  tags:
  - BNY
  - Asset Servicing
  - Custody
  created: '2026-05-23'
  modified: '2026-05-23'
binds:
- namespace: env
  keys:
    BNY_API_KEY: BNY_API_KEY
capability:
  consumes:
  - type: http
    namespace: bny-asset-servicing
    baseUri: https://apigateway.bny.com
    description: BNY Asset Servicing business capability. Self-contained, no shared references.
    resources:
    - name: status
      path: /v1/status
      operations:
      - name: getstatus
        method: GET
        description: Get Asset Servicing Status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.BNY_API_KEY}}'
  exposes:
  - type: rest
    namespace: bny-asset-servicing-rest
    port: 8080
    description: REST adapter for BNY Asset Servicing. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/status
      name: status
      description: REST surface for status.
      operations:
      - method: GET
        name: getstatus
        description: Get Asset Servicing Status
        call: bny-asset-servicing.getstatus
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bny-asset-servicing-mcp
    port: 9090
    transport: http
    description: MCP adapter for BNY Asset Servicing. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: get-asset-servicing-status
      description: Get Asset Servicing Status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bny-asset-servicing.getstatus
      outputParameters:
      - type: object
        mapping: $.
