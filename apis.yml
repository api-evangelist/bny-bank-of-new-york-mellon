  - aid: bny-bank-of-new-york-mellon:data-on-chain
    name: BNY Data On-Chain
    description: BNY Data On-Chain publishes BNY-attested data on-chain so on-chain consumers can read it directly
      from smart contracts. The product ships a Solidity consumer interface (IBNYDataConsumerV2) with typed
      accessors (getType, getUint256, getInt256, getBytes32, getString32) and is deployed on Ethereum Mainnet and
      Sepolia testnet. The user guide repository is the canonical public artifact.
