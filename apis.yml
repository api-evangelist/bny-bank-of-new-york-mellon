  - aid: bny-bank-of-new-york-mellon:treasury-services-api
    name: BNY Treasury Services API
    description: BNY Treasury Services APIs cover payments (USD clearing, global ACH, RTP, wires, Pay by Bank /
      open banking), liquidity, cash management, trade finance, and FX. BNY is one of the largest USD clearers in
      the world and exposes these capabilities to corporate, FI, and fintech clients through the BNY Developer
      Marketplace.
