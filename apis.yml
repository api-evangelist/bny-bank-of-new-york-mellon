aid: bny-bank-of-new-york-mellon
name: BNY (Bank of New York Mellon)
description: BNY (rebranded from BNY Mellon in 2024, NYSE ticker changed from BK to BNY in May 2026) is the world's
  largest custodian bank, overseeing approximately $59.4 trillion in assets under custody and/or administration and
  $2.1 trillion in assets under management as of Q1 2026. BNY operates across Securities Services, Market & Wealth
  Services, and Investment & Wealth Management, with brand families including Pershing (clearing and custody for
  wealth managers, parent of NetX360+ and the Wove platform), Eagle Investment Systems (investment data management),
  Albridge (wealth data aggregation), BNY Markets (FX, securities finance, capital markets), and BNY Investments.
  BNY publishes APIs through the BNY Developer Marketplace at developer.bny.com (formerly marketplace.bnymellon.com),
  covering Asset Servicing, Treasury Services, Payments, Pershing, Markets, and the BNY Data On-Chain product, with
  registration and API reference gated behind a Nexen single sign-on.
