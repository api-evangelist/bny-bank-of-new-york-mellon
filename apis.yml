  - aid: bny-bank-of-new-york-mellon:pershing-api
    name: BNY Pershing API
    description: BNY Pershing APIs expose the Pershing clearing and custody platform — NetX360+ for advisors and
      the Wove wealth platform — to broker-dealers, RIAs, and wealth technology partners. Surface includes account
      opening, brokerage operations, positions and balances, statements, and integrations with the broader Wove
      ecosystem (planning, billing, performance, model marketplace).
